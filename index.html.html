
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caça às Fake News - Avançado</title>
<style>
body{font-family:Arial,sans-serif;background:#eef5ff;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:white;padding:25px;border-radius:12px}
h1{color:#0b4ea2}
.badge{display:inline-block;background:#0b4ea2;color:white;padding:6px 10px;border-radius:20px}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;background:#0b4ea2;color:white;cursor:pointer}
button:hover{opacity:.9}
.card{border:1px solid #ddd;padding:15px;border-radius:8px;margin-top:15px}
.progress{height:20px;background:#ddd;border-radius:10px;overflow:hidden}
.bar{height:100%;background:#0b4ea2;width:0%}
</style>
</head>
<body>
<div class="container">
<h1>🎮 Caça às Fake News</h1>
<p>Analise a manchete e escolha a resposta correta.</p>

<div>
<span class="badge">Pontuação: <span id="score">0</span></span>
<span class="badge">Tempo: <span id="timer">15</span>s</span>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="card">
<h2 id="headline"></h2>
<div id="answers">
<button onclick="answer(true)">✅ Verdadeira</button>
<button onclick="answer(false)">❌ Falsa</button>
</div>
<p id="feedback"></p>
<button id="next" onclick="nextQuestion()" style="display:none">Próxima</button>
</div>

<div id="end"></div>
</div>

<script>
const questions=[
{headline:"Pesquisadores descobriram uma vacina que elimina todas as doenças conhecidas.",correct:false,exp:"Nenhuma vacina elimina todas as doenças."},
{headline:"Verificar a fonte antes de compartilhar notícias ajuda a combater a desinformação.",correct:true,exp:"É uma prática recomendada."},
{headline:"Todas as imagens virais na internet representam fatos reais.",correct:false,exp:"Imagens podem ser manipuladas ou retiradas de contexto."},
{headline:"Sites governamentais e instituições reconhecidas tendem a ser fontes mais confiáveis.",correct:true,exp:"Geralmente possuem processos de verificação."},
{headline:"Compartilhar uma notícia sem ler o conteúdo pode espalhar desinformação.",correct:true,exp:"O ideal é ler e verificar antes de compartilhar."},
{headline:"Qualquer mensagem recebida em aplicativos é automaticamente verdadeira.",correct:false,exp:"Mensagens podem conter informações falsas."}
];

let current=0,score=0,time=15,interval;

function load(){
document.getElementById("headline").textContent=questions[current].headline;
document.getElementById("feedback").textContent="";
document.getElementById("next").style.display="none";
time=15;
document.getElementById("timer").textContent=time;
clearInterval(interval);
interval=setInterval(()=>{
time--;
document.getElementById("timer").textContent=time;
if(time<=0){
clearInterval(interval);
document.getElementById("feedback").innerHTML="⏰ Tempo esgotado!";
document.getElementById("next").style.display="inline-block";
}
},1000);

document.getElementById("bar").style.width=((current/questions.length)*100)+"%";
}

function answer(choice){
clearInterval(interval);
const q=questions[current];
if(choice===q.correct){
score+=20;
document.getElementById("feedback").innerHTML="✅ Correto! "+q.exp;
}else{
document.getElementById("feedback").innerHTML="❌ Incorreto. "+q.exp;
}
document.getElementById("score").textContent=score;
document.getElementById("next").style.display="inline-block";
}

function nextQuestion(){
current++;
if(current<questions.length){
load();
}else{
finish();
}
}

function finish(){
let medalha="🥉 Iniciante";
if(score>=80) medalha="🥇 Especialista em Verificação";
else if(score>=50) medalha="🥈 Caçador de Fake News";

document.querySelector(".card").style.display="none";
document.getElementById("bar").style.width="100%";
document.getElementById("end").innerHTML=`
<h2>🏆 Fim do Jogo!</h2>
<p>Pontuação Final: <strong>${score}</strong></p>
<p>Medalha: <strong>${medalha}</strong></p>
<p>Você aprendeu a identificar informações confiáveis e combater fake news.</p>
<button onclick="location.reload()">Jogar Novamente</button>
`;
}

load();
</script>
</body>
</html>
